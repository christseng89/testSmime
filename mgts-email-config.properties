# MGTS S/MIME Email Configuration
# Configuration file for different environments

# ===========================================
# PRODUCTION ENVIRONMENT SETTINGS
# ===========================================
[production]
# SMTP Server Configuration
smtp.host=smtp.production.company.com
smtp.port=587
smtp.username=mgts-prod@company.com
smtp.password=${MGTS_EMAIL_PASSWORD}
smtp.tls.enabled=true
smtp.auth.enabled=true
smtp.connection.timeout=30000
smtp.read.timeout=60000

# Certificate Configuration
certificate.path=/etc/mgts/certificates/production/mgts-signing-cert.pem
private.key.path=/etc/mgts/certificates/production/mgts-private-key.pem
certificate.password=${MGTS_CERT_PASSWORD}

# Email Settings
email.from.default=mgts-notifications@company.com
email.from.alerts=mgts-alerts@company.com
email.from.reports=mgts-reports@company.com
email.retry.attempts=3
email.retry.delay.ms=5000

# S/MIME Settings
smime.signature.algorithm=SHA256withRSA
smime.digest.algorithm=SHA-256
smime.include.certificates=true
smime.detached.signature=false

# Security Settings
security.provider=BC
security.keystore.type=PKCS12
security.signature.validation=strict

# ===========================================
# TEST ENVIRONMENT SETTINGS
# ===========================================
[test]
# SMTP Server Configuration
smtp.host=smtp.test.company.com
smtp.port=587
smtp.username=mgts-test@company.com
smtp.password=test-password-123
smtp.tls.enabled=true
smtp.auth.enabled=true
smtp.connection.timeout=20000
smtp.read.timeout=40000

# Certificate Configuration
certificate.path=certificates/test/mgts-test-cert.pem
private.key.path=certificates/test/mgts-test-key.pem
certificate.password=test-cert-password

# Email Settings
email.from.default=mgts-test@company.com
email.from.alerts=mgts-test-alerts@company.com
email.from.reports=mgts-test-reports@company.com
email.retry.attempts=2
email.retry.delay.ms=3000

# S/MIME Settings
smime.signature.algorithm=SHA256withRSA
smime.digest.algorithm=SHA-256
smime.include.certificates=true
smime.detached.signature=false

# Security Settings
security.provider=BC
security.keystore.type=PKCS12
security.signature.validation=normal

# ===========================================
# DEVELOPMENT ENVIRONMENT SETTINGS
# ===========================================
[development]
# SMTP Server Configuration (using local test server)
smtp.host=localhost
smtp.port=1025
smtp.username=dev@localhost
smtp.password=
smtp.tls.enabled=false
smtp.auth.enabled=false
smtp.connection.timeout=10000
smtp.read.timeout=20000

# Certificate Configuration (self-signed for development)
certificate.path=certificates/dev/self-signed-cert.pem
private.key.path=certificates/dev/self-signed-key.pem
certificate.password=dev-password

# Email Settings
email.from.default=mgts-dev@localhost
email.from.alerts=mgts-dev-alerts@localhost
email.from.reports=mgts-dev-reports@localhost
email.retry.attempts=1
email.retry.delay.ms=1000

# S/MIME Settings
smime.signature.algorithm=SHA256withRSA
smime.digest.algorithm=SHA-256
smime.include.certificates=true
smime.detached.signature=false

# Security Settings
security.provider=BC
security.keystore.type=PKCS12
security.signature.validation=lenient

# Development-specific settings
dev.debug.enabled=true
dev.mock.smtp.enabled=true
dev.log.email.content=true

# ===========================================
# LOGGING CONFIGURATION
# ===========================================
# Logging levels for different environments
[logging]
# Production logging
production.log.level=INFO
production.log.file=/var/log/mgts/smime-email.log
production.log.max.size=100MB
production.log.max.files=10

# Test logging
test.log.level=DEBUG
test.log.file=logs/smime-email-test.log
test.log.max.size=50MB
test.log.max.files=5

# Development logging
development.log.level=DEBUG
development.log.console.enabled=true
development.log.file=logs/smime-email-dev.log

# ===========================================
# EMAIL TEMPLATES CONFIGURATION
# ===========================================
[templates]
# Notification email template
notification.subject.prefix=[MGTS]
notification.signature.footer=This email has been digitally signed using S/MIME to ensure authenticity and integrity.
notification.company.name=Your Company Name
notification.support.email=support@company.com

# Alert email template
alert.subject.prefix=[MGTS ALERT]
alert.priority.high.subject.prefix=[MGTS CRITICAL ALERT]
alert.signature.footer=This security alert has been digitally signed. Please verify the signature before taking action.

# Report email template
report.subject.prefix=[MGTS Report]
report.signature.footer=This report has been digitally signed to ensure data integrity and authenticity.

# ===========================================
# PERFORMANCE SETTINGS
# ===========================================
[performance]
# Email sending performance settings
email.pool.size=10
email.queue.size=1000
email.batch.size=50
email.send.delay.ms=100

# Certificate caching
certificate.cache.enabled=true
certificate.cache.ttl.minutes=60
certificate.reload.check.minutes=5

# Connection pooling
smtp.connection.pool.enabled=true
smtp.connection.pool.size=5
smtp.connection.pool.timeout.ms=30000

# ===========================================
# MONITORING & METRICS
# ===========================================
[monitoring]
# Email sending metrics
metrics.enabled=true
metrics.export.interval.seconds=60
metrics.retention.days=30

# Health check settings
health.check.enabled=true
health.check.interval.minutes=5
health.smtp.test.recipient=health-check@company.com

# Alerting
alert.failed.emails.threshold=10
alert.certificate.expiry.days=30
alert.notification.email=ops-team@company.com

# ===========================================
# SECURITY POLICIES
# ===========================================
[security]
# Certificate validation policies
certificate.expiry.check.enabled=true
certificate.revocation.check.enabled=true
certificate.chain.validation.enabled=true

# Email content policies
content.virus.scan.enabled=true
content.spam.check.enabled=false
content.max.attachment.size.mb=25
content.allowed.attachment.types=pdf,txt,doc,docx,xls,xlsx,csv

# Signature policies
signature.require.timestamp=false
signature.verify.certificate.chain=true
signature.allow.self.signed=false

# ===========================================
# COMPLIANCE SETTINGS
# ===========================================
[compliance]
# Audit logging
audit.enabled=true
audit.log.file=/var/log/mgts/smime-audit.log
audit.log.all.emails=true
audit.log.signature.details=true
audit.retention.months=24

# Data protection
gdpr.compliance.enabled=true
data.encryption.at.rest=true
personal.data.anonymization=true

# ===========================================
# DISASTER RECOVERY
# ===========================================
[disaster-recovery]
# Backup settings
backup.certificates.enabled=true
backup.certificates.location=/backup/mgts/certificates/
backup.configuration.enabled=true
backup.logs.enabled=true

# Failover settings
failover.smtp.servers=smtp-backup1.company.com:587,smtp-backup2.company.com:587
failover.switch.threshold.failures=3
failover.switch.back.delay.minutes=15
